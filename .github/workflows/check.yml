name: Ticket Checker

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check Ticketmaster page
        run: |
          PAGE=$(curl -s "https://www.ticketmaster.ca/noah-kahan-the-great-divide-tour-vancouver-british-columbia-08-28-2026/event/1100643DA3BF7B99")

          echo "$PAGE" > page.html

          if ! grep -qi "tickets are sold out now" page.html; then
            curl -s "https://api.telegram.org/bot8938346563:AAHjG2Z5LQGiV59HoB7wf5Lb12h0tYbEL90/sendMessage" \
              -d chat_id=8612489860 \
              -d text="🎟 Noah Kahan tickets may be AVAILABLE — check now!"
          else
            echo "Still sold out"
          fi
